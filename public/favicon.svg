<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#000005"/>
  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="rgba(124,58,237,0.25)" stroke-width="0.5"/>
  <!-- Accretion disk ellipse -->
  <ellipse cx="16" cy="16" rx="12" ry="3.5" fill="none" stroke="rgba(249,115,22,0.55)" stroke-width="1.8"/>
  <!-- Photon ring -->
  <circle cx="16" cy="16" r="6.5" fill="none" stroke="rgba(192,132,252,0.85)" stroke-width="1.2"/>
  <!-- Event horizon -->
  <circle cx="16" cy="16" r="5" fill="#000000"/>
  <!-- Inner glow -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="rgba(124,58,237,0.4)" stroke-width="0.4"/>
</svg>
